<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <a href="{{ '/' | relative_url }}" class="sidebar-logo">
      <img src="{{ '/assets/flowpay-icon.webp' | relative_url }}" class="logo-mark" alt="FlowPay">
      <div class="logo-text">
        <img src="{{ '/assets/flowpay-header-logo.webp' | relative_url }}" class="logo-product" alt="FlowPay">
        <span class="logo-section">Central de Ajuda</span>
      </div>
    </a>
    <button class="sidebar-close" onclick="closeSidebar()" aria-label="Fechar menu">✕</button>
  </div>

  <div class="sidebar-search">
    <input type="text" id="search-input" placeholder="Buscar no manual…" autocomplete="off" spellcheck="false">
    <span class="search-icon">⌕</span>
    <div class="search-results" id="search-results"></div>
  </div>

  <nav class="sidebar-nav">

    <div class="nav-group">
      <span class="nav-group-label">Visão geral</span>
      <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">
        Início
      </a>
    </div>

    <div class="nav-group">
      <span class="nav-group-label nav-group-vendor">Vendedor</span>
      <a href="{{ '/vendedor/acesso' | relative_url }}" class="nav-link {% if page.url contains 'acesso' and page.url contains 'vendedor' %}active{% endif %}">
        <span class="nav-step">01</span> Acessar a conta
      </a>
      <a href="{{ '/vendedor/configuracao' | relative_url }}" class="nav-link {% if page.url contains 'configuracao' %}active{% endif %}">
        <span class="nav-step">02</span> Configurar PIX
      </a>
      <a href="{{ '/vendedor/checkout' | relative_url }}" class="nav-link {% if page.url contains 'checkout' %}active{% endif %}">
        <span class="nav-step">03</span> Receber pagamentos
      </a>
      <a href="{{ '/vendedor/pagamentos' | relative_url }}" class="nav-link {% if page.url contains 'pagamentos' %}active{% endif %}">
        <span class="nav-step">04</span> Acompanhar pagamentos
      </a>
      <a href="{{ '/vendedor/saque' | relative_url }}" class="nav-link {% if page.url contains 'saque' %}active{% endif %}">
        <span class="nav-step">05</span> Sacar recebimentos
      </a>
      <a href="{{ '/vendedor/faq' | relative_url }}" class="nav-link {% if page.url contains 'vendedor/faq' %}active{% endif %}">
        FAQ do vendedor
      </a>
    </div>

    <div class="nav-group">
      <span class="nav-group-label nav-group-admin">Administrador</span>
      <a href="{{ '/admin/acesso' | relative_url }}" class="nav-link {% if page.url contains 'admin/acesso' %}active{% endif %}">
        Acessar o painel
      </a>
      <a href="{{ '/admin/operacao' | relative_url }}" class="nav-link {% if page.url contains 'operacao' %}active{% endif %}">
        Operar o painel
      </a>
      <a href="{{ '/admin/encerrar' | relative_url }}" class="nav-link {% if page.url contains 'encerrar' %}active{% endif %}">
        Encerrar sessão
      </a>
    </div>

    <div class="nav-group">
      <span class="nav-group-label">Geral</span>
      <a href="{{ '/faq' | relative_url }}" class="nav-link {% if page.url == '/faq/' or page.url == '/faq' %}active{% endif %}">
        FAQ geral
      </a>
    </div>

  </nav>

  <div class="sidebar-footer">
    <span class="sidebar-badge">v1.0</span>
    <span>Manual do Usuário</span>
  </div>
</aside>
