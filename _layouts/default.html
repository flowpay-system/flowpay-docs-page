<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}FlowPay Docs</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  {% include sidebar.html %}

  <div class="layout-main">
    {% include topbar.html %}

    <main class="content" id="main-content">
      <div class="content-inner">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <span>FlowPay App — Central de Ajuda</span>
      <span class="footer-sep">·</span>
      <span>Versão {{ site.version | default: "1.0" }}</span>
    </footer>
  </div>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
