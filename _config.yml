title: "FlowPay — Central de Ajuda"
description: "Manual completo do FlowPay App para vendedores e administradores."
baseurl: ""
url: ""
lang: pt-BR

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
