title: 'FlowPay — Central de Ajuda'
description: 'Manual público do FlowPay App para vendedores e dúvidas gerais.'
baseurl: ''
url: 'https://docs.flowpay.cash'
lang: pt-BR

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
